# Liquibase configuration example
# Copy this file to liquibase.properties and fill in your values
# NEVER commit liquibase.properties with real credentials to version control

driver=org.postgresql.Driver
url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecomera_cart}
username=${DB_USERNAME:postgres}
password=${DB_PASSWORD:change-me}
changeLogFile=classpath:db/changelog/db.changelog-master.xml
